<script>
// ─── 기본 설정 적용 ──────────────────────────────────────────────
document.getElementById("headerTitle").textContent = "⬡ " + CONFIG.unionName;
document.getElementById("kakaoBtn").href = CONFIG.kakaoUrl;
document.title = CONFIG.unionName + " | 승리의 여신: 니케";

// ─── 최신/이전 시즌 데이터 (객체 키 구조) ────────────────────────
const seasonKeys    = Object.keys(UNION).map(Number).sort((a, b) => a - b);
const latestKey     = seasonKeys[seasonKeys.length - 1];
const prevKey       = seasonKeys.length >= 2 ? seasonKeys[seasonKeys.length - 2] : null;
const currentSeason = UNION[latestKey];
const prevSeason    = prevKey ? UNION[prevKey] : null;

// 이전 시즌 멤버 uid 맵
const prevMemberMap = {};
if (prevSeason) {
  prevSeason.members.forEach(m => { prevMemberMap[m.uid] = m; });
}

// ─── 지표 계산 ───────────────────────────────────────────────────
const members    = currentSeason.members;
const avgLevel   = (members.reduce((s, m) => s + m.syncroLevel, 0) / members.length).toFixed(2);

// rank가 있는 가장 마지막 시즌을 역순으로 탐색
const rankKey    = [...seasonKeys].reverse().find(k => UNION[k].rank != null);
const latestRank = rankKey != null ? UNION[rankKey].rank : null;

document.getElementById("metricAvgLevel").textContent = avgLevel;

// 일정 포맷
const KR_DAYS = ["일","월","화","수","목","금","토"];
function formatSchedule(s) {
  if (!s) return "미정";
  function fmt(str) {
    const d = new Date(str);
    const y = d.getFullYear();
    const mo = String(d.getMonth() + 1).padStart(2, "0");
    const da = String(d.getDate()).padStart(2, "0");
    return y + "-" + mo + "-" + da + " (" + KR_DAYS[d.getDay()] + ")";
  }
  return fmt(s.start) + " ~ " + fmt(s.end);
}
document.getElementById("metricUnionRaid").textContent = formatSchedule(CONFIG.schedule.unionRaid);
document.getElementById("metricSoloRaid").textContent  = formatSchedule(CONFIG.schedule.soloRaid);

// ─── 멤버 테이블 렌더링 ──────────────────────────────────────────
const ROLE_DISPLAY = { Leader: "리더", Officer: "서브리더", Member: "일반" };
const ROLE_BADGE   = { Leader: "badge-leader", Officer: "badge-officer", Member: "badge-member" };

// 싱크로레벨 내림차순, 동일하면 닉네임 가나다순
const sorted = [...members].sort((a, b) => {
  if (b.syncroLevel !== a.syncroLevel) return b.syncroLevel - a.syncroLevel;
  return a.name.localeCompare(b.name, "ko");
});

const tbody = document.getElementById("memberTableBody");
sorted.forEach((m, i) => {
  const role     = m.role || "Member";   // role 미지정 시 Member 기본값
  const prev     = prevMemberMap[m.uid];
  const isNew    = prev == null;
  const diff     = prev != null ? m.syncroLevel - prev.syncroLevel : null;
  const diffHtml = isNew
    ? '<span class="level-diff new">(New)</span>'
    : diff > 0
      ? '<span class="level-diff up">(+' + diff + ')</span>'
      : diff < 0
        ? '<span class="level-diff down">(' + diff + ')</span>'
        : '<span class="level-diff zero">(+0)</span>';

  const bbUrl     = "https://www.blablalink.com/shiftyspad/nikke-list?openid=29080-" + m.blaBlaLinkUId;
  const rankClass = i === 0 ? "rank-1" : i < 3 ? "rank-top" : "dim";

  const tr = document.createElement("tr");
  tr.innerHTML =
    '<td class="' + rankClass + '">' + (i + 1) + '</td>' +
    '<td class="primary">' + m.name + '</td>' +
    '<td><span style="font-weight:600;color:var(--text)">' + m.syncroLevel + '</span> ' + diffHtml + '</td>' +
    '<td><span class="badge ' + (ROLE_BADGE[role] || "badge-member") + '">' + (ROLE_DISPLAY[role] || "일반") + '</span></td>' +
    '<td class="center"><a href="' + bbUrl + '" target="_blank" class="bblink" title="시프티패드 프로필 보기">' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>' +
        '<circle cx="12" cy="7" r="4"/>' +
      '</svg>' +
    '</a></td>';
  tbody.appendChild(tr);
});

      {name:"세이렌",img:"세이렌",note:"버충"},{name:"클리드",img:"클리드"},{name:"라피",img:"라피",note:"선버"},
      {name:"클디젤",img:"클디젤",note:"후버"},{name:"미하라",img:"미하라",note:"토템"}

    ]},
    { elem:"전격", chars:[
      {name:"목단",img:"목단"},{name:"바이드",img:"바이드",note:"버충"},{name:"신데렐라",img:"신데렐라"},
      {name:"수니스",img:"수니스"},{name:"클이든",img:"클이든"}
    ]},
  ]},
  { labels:["철갑","풍압","전격"], rows:[
    { elem:"철갑", chars:[
      {name:"리타",img:"리타"},{name:"크라운",img:"크라운"},{name:"라피",img:"라피"},
      {name:"레드후드",img:"레드후드",note:"버충",alts:[{name:"이브",img:"이브"},{name:"레이븐",img:"레이븐"}]},

    { elem:"풍압", chars:[

      {name:"나유타",img:"나유타"},
      {name:"벨벳",img:"벨벳",alts:[{name:"메스트",img:"메스트"}]}
    ]},
    { elem:"전격", chars:[
      {name:"목단",img:"목단"},{name:"바이드",img:"바이드",note:"버충"},{name:"신데렐라",img:"신데렐라"},

      {name:"수니스",img:"수니스"},{name:"클이든",img:"클이든"}
    ]},
  ]},
];

function makeCharSlot(char, isPrimary) {
  const slot = document.createElement("div");
  slot.className = "char-slot" + (isPrimary ? "" : " char-alt");
  if (char.img) {
    const img = document.createElement("img");
    img.className = "char-portrait";
    img.src = "image/" + char.img + ".webp";
    img.alt = char.name;
    slot.appendChild(img);
  } else {
    const ph = document.createElement("div");
    ph.className = "char-portrait char-portrait-ph";
    ph.textContent = char.name.slice(0, 2);
    slot.appendChild(ph);
  }
  const nm = document.createElement("div");
  nm.className = "char-name";
  nm.textContent = char.name;
  if (char.note) {
    const notes = Array.isArray(char.note) ? char.note : [char.note];
    notes.forEach(t => {
      const n = document.createElement("span");
      n.className = "char-note";
      n.textContent = t;
      nm.appendChild(n);
    });
  }
  slot.appendChild(nm);
  return slot;
}

function renderDecks() {
  const panelsEl = document.getElementById("deckPanels");
  if (!panelsEl) return;

  DECK_DATA.forEach((deck, idx) => {
    // 속성별 캐릭터 행
    const panel = document.createElement("div");
    panel.className = "deck-panel active";

    deck.rows.forEach(row => {
      const rowEl = document.createElement("div");
      rowEl.className = "deck-row";

      const lbl = document.createElement("div");
      lbl.className = "deck-elem-lbl elem-chip chip-" + ELEM_CLS[row.elem];
      lbl.textContent = row.elem;
      rowEl.appendChild(lbl);

      const charsEl = document.createElement("div");
      charsEl.className = "deck-chars";

      row.chars.forEach(char => {
        if (char.alts && char.alts.length > 0) {
          const grp = document.createElement("div");
          grp.className = "char-or-grp";
          grp.appendChild(makeCharSlot(char, true));
          char.alts.forEach(alt => {
            const sep = document.createElement("div");
            sep.className = "char-or-sep";
            sep.textContent = "or";
            grp.appendChild(sep);
            grp.appendChild(makeCharSlot(alt, false));
          });
          charsEl.appendChild(grp);
        } else {
          charsEl.appendChild(makeCharSlot(char, true));
        }
      });

      rowEl.appendChild(charsEl);
      panel.appendChild(rowEl);
    });

    panelsEl.appendChild(panel);

    // 마지막이 아니면 구분선
    if (idx < DECK_DATA.length - 1) {
      const div = document.createElement("div");
      div.className = "deck-divider";
      panelsEl.appendChild(div);
    }
  });
}

renderDecks();

// ─── 추천덱 이미지 복사 ──────────────────────────────────────────
(function() {
  var btn   = document.getElementById("deckCopyBtn");
  var toast = document.getElementById("deckCopyToast");
  var panels = document.getElementById("deckPanels");
  var toastTimer = null;

  function showToast() {
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toast.classList.remove("show");
    }, 2500);
  }

  btn.addEventListener("click", function() {
    btn.disabled = true;
    html2canvas(panels, {
      backgroundColor: getComputedStyle(document.getElementById("deckSection")).backgroundColor,
      scale: 2,
      useCORS: true,
      logging: false
    }).then(function(canvas) {
      canvas.toBlob(function(blob) {
        navigator.clipboard.write([
          new ClipboardItem({ "image/png": blob })
        ]).then(function() {
          showToast();
        }).catch(function() {
          // 클립보드 API 실패 시 다운로드로 폴백
          var a = document.createElement("a");
          a.href = canvas.toDataURL("image/png");
          a.download = "union-raid-deck.png";
          a.click();
          showToast();
        }).finally(function() {
          btn.disabled = false;
        });
      }, "image/png");
    }).catch(function() {
      btn.disabled = false;
    });
  });
})();

// ─── 순위 추이 (상단 카드) ──────────────────────────────────────
const last5   = seasonKeys.slice(-5);
const flowEl  = document.getElementById("metricRankFlow");
const parts   = last5.map((k, idx) => {
  const rank   = UNION[k].rank;
  const val    = rank != null ? rank + "위" : "?";
  const isLast = idx === last5.length - 1;
  const span   = '<span class="rank-flow-item' + (rank == null ? ' rank-flow-unknown' : '') + '">' + val + '</span>';
  return isLast ? span : span + '<span class="rank-flow-arrow">→</span>';
});
flowEl.className = "metric-rank-flow rank-flow";
flowEl.innerHTML = parts.join("");
</script>

<script>
// ─── 모바일 탭 전환 ──────────────────────────────────────────────
const mainLayout = document.getElementById("mainLayout");

function switchTab(which) {
  mainLayout.dataset.active = which;
  document.querySelectorAll(".mobile-tab").forEach(t =>
    t.classList.toggle("active", t.dataset.tab === which)
  );
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.querySelectorAll(".mobile-tab").forEach(tab =>
  tab.addEventListener("click", () => switchTab(tab.dataset.tab))
);

// 리사이즈 시 데스크탑 → 상태 초기화 불필요 (CSS가 처리)
</script>

<script>
(function() {
  const html   = document.documentElement;
  const btn    = document.getElementById("themeToggle");
  const saved  = localStorage.getItem("theme");
  if (saved === "dark") { html.classList.add("dark"); btn.textContent = "☀️"; }
  btn.addEventListener("click", function() {
    const isDark = html.classList.toggle("dark");
    btn.textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
})();
</script>
