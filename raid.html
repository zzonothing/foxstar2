<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유니온레이드 | 승리의 여신: 니케</title>
  <link rel="icon" type="image/png" href="image/foxstar.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark");</script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .container { max-width: 1320px; }

    .raid-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── 컨트롤 바 ─────────────────────────────────────────── */
    .raid-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .raid-controls .season-group { margin-right: auto; }
    .raid-controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .raid-controls input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: var(--blue);
    }
    .raid-controls select {
      height: 30px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .raid-controls select:focus { border-color: var(--blue); }

    /* ── 테이블 ────────────────────────────────────────────── */
    .raid-table-wrap { overflow-x: auto; }
    .raid-table {
      width: auto;
      border-collapse: collapse;
      font-size: 13px;
      white-space: nowrap;
      table-layout: fixed;
    }
    .raid-table th {
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      background: var(--bg-muted);
      text-align: center;
      border: 1.5px solid #94a3b8;
    }
    .raid-table th:first-child { border-radius: 8px 0 0 0; border-left: 1.5px solid #94a3b8; }
    .raid-table th:last-child  { border-radius: 0 8px 0 0; }
    .raid-table td {
      padding: 10px 14px;
      border-bottom: 1.5px solid #94a3b8;
      border-right: 1.5px solid #94a3b8;
      color: var(--text);
      text-align: center;
      vertical-align: middle;
    }
    .raid-table td:first-child { border-left: 1.5px solid #94a3b8; }
    .raid-table tbody tr:last-child td { border-bottom: 1.5px solid #94a3b8; }
    .raid-table tbody tr:hover td      { background: var(--bg-muted); }

    .td-name   { font-weight: 700; color: var(--text); text-align: left !important; }
    .td-damage { font-weight: 600; font-variant-numeric: tabular-nums; }
    .td-total  { font-weight: 700; color: var(--blue); font-variant-numeric: tabular-nums; }
    .td-empty  { color: var(--text-dim); }

    /* 전역 thead border 재정의 */
    .raid-table thead tr { border-bottom: 1.5px solid #94a3b8; }

    /* 푸터 */
    .raid-table tfoot td:first-child { border-left: none; }
    .raid-table tfoot td {
      padding: 10px 14px;
      border: none;
      background: var(--bg-card);
      font-weight: 700;
      text-align: center;
      vertical-align: top;
      font-size: 13px;
    }
    .td-foot-sub { font-size: 11px; font-weight: 500; color: var(--text-sub); margin-top: 2px; }

    /* 보스 컬럼 헤더 구분 */
    .th-boss { }
    .td-boss  { }

    /* 약점 태그 색상 */
    .elem-수냉 { color: #3b82f6; }
    .elem-전격 { color: #a855f7; }
    .elem-풍압 { color: #22c55e; }
    .elem-작열 { color: #ef4444; }
    .elem-철갑 { color: #f59e0b; }

    /* 대미지 있는 보스 셀 배경 */
    .td-boss-수냉 { background: rgba(59,130,246,0.07);  }
    .td-boss-전격 { background: rgba(168,85,247,0.07);  }
    .td-boss-풍압 { background: rgba(34,197,94,0.07);   }
    .td-boss-작열 { background: rgba(239,68,68,0.07);   }
    .td-boss-철갑 { background: rgba(245,158,11,0.07);  }

    /* 보스 컬럼 고정 너비 */
    .th-boss, .td-boss-수냉, .td-boss-전격, .td-boss-풍압,
    .td-boss-작열, .td-boss-철갑, .td-boss-empty {
      width: 150px;
      min-width: 150px;
      max-width: 150px;
    }
  </style>
</head>
<body>

<!-- ═══════════ 헤더 ═══════════ -->
<header>
  <div class="container">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">승리의 여신: 니케 · UNION PORTAL</div>
        <div class="header-title" id="headerTitle">⬡ 여우별 유니온</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <button class="theme-toggle" id="themeToggle" title="다크/라이트 모드 전환">🌙</button>
        <a id="kakaoBtn" href="#" target="_blank" class="kakao-btn">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="#1a1200">
            <path d="M12 3C6.48 3 2 6.69 2 11.25c0 2.87 1.76 5.4 4.41 6.95L5.25 21 l3.86-2.06A11.3 11.3 0 0012 19.5c5.52 0 10-3.69 10-8.25S17.52 3 12 3z"/>
          </svg>
          가입 문의
        </a>
      </div>
    </div>
    <nav>
      <a href="index.html">홈</a>
      <a href="raid.html" class="active">유니온레이드</a>
      <a href="shift.html">시프티패드</a>
    </nav>
  </div>
</header>

<!-- ═══════════ 메인 ═══════════ -->
<main>
  <div class="container page-content">
    <div class="raid-card">

      <!-- 컨트롤 바 -->
      <div class="raid-controls">
        <label class="season-group">
          시즌:
          <select id="seasonSelect"></select>
        </label>
        <label>
          <input type="checkbox" id="compactToggle" checked>
          간략히
        </label>
      </div>

      <!-- 기록 테이블 -->
      <div class="raid-table-wrap">
        <table class="raid-table" id="raidTable">
          <thead id="raidTableHead"></thead>
          <tbody id="raidTableBody"></tbody>
          <tfoot id="raidTableFoot"></tfoot>
        </table>
      </div>

    </div>
  </div>
</main>

<!-- ═══════════ 데이터 로드 ═══════════ -->
<script src="data/config.js"></script>
<script src="data/union.js"></script>
<script src="data/raid.js"></script>

<!-- ═══════════ 레이드 스크립트 ═══════════ -->
<script>
// ─── 기본 설정 ───────────────────────────────────────────────────
document.getElementById("headerTitle").textContent = "⬡ " + CONFIG.unionName;
document.getElementById("kakaoBtn").href = CONFIG.kakaoUrl;
document.title = "유니온레이드 | " + CONFIG.unionName;

// ─── 대미지 포맷 ─────────────────────────────────────────────────
function fmtCompact(num) {
  if (num == null || num === 0) return "—";
  const uk    = num / 100000000;
  const fixed = uk.toFixed(2);
  const parts = fixed.split(".");
  parts[0]    = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return parts.join(".") + "억";
}
function fmtFull(num) {
  if (num == null || num === 0) return "—";
  return num.toLocaleString("ko-KR");
}

// ─── 보스 코드 → 약점 속성 매핑 ─────────────────────────────────
const BOSS_ELEM = {
  "[Z.E.U.S.]": "철갑",
  "[H.S.T.A.]": "수냉",
  "[D.M.T.R.]": "풍압",
  "[A.N.M.I.]": "작열",
  "[A.N.M.I]":  "작열",
  "[P.S.I.D.]": "전격",
};

function getBossElem(fullName) {
  const m = fullName.match(/\[([^\]]+)\]$/);
  if (!m) return null;
  return BOSS_ELEM["[" + m[1] + "]"] || null;
}

function shortBossName(name) {
  return name.replace(/\s*\[.*?\]$/, "").trim();
}

// ─── 시즌 셀렉터 초기화 ──────────────────────────────────────────
const seasonKeys   = Object.keys(RAID).sort((a, b) => {
  const na = Number(a.replace("S", ""));
  const nb = Number(b.replace("S", ""));
  return na - nb;
});
const seasonSelect = document.getElementById("seasonSelect");
seasonKeys.forEach(k => {
  const opt = document.createElement("option");
  opt.value       = k;
  opt.textContent = k;
  seasonSelect.appendChild(opt);
});
seasonSelect.value = seasonKeys[seasonKeys.length - 1];

// ─── 렌더링 ──────────────────────────────────────────────────────
function renderRaidTable(seasonKey) {
  const compact   = document.getElementById("compactToggle").checked;
  const fmt       = compact ? fmtCompact : fmtFull;
  const members   = RAID[seasonKey] || [];
  const thead     = document.getElementById("raidTableHead");
  const tbody     = document.getElementById("raidTableBody");
  thead.innerHTML = "";
  tbody.innerHTML = "";

  // ── UNION에서 싱크로레벨 조회 (openId ↔ blaBlaLinkUId) ──────
  const unionKey  = seasonKey.replace("S", "");
  const unionData = UNION[unionKey];
  const syncroMap = {};
  if (unionData) {
    unionData.members.forEach(m => {
      if (m.blaBlaLinkUId) syncroMap[m.blaBlaLinkUId] = m.syncroLevel;
    });
  }

  // ── 시즌 내 보스 목록 수집 (step 오름차순) ──────────────────
  const bossMap = new Map(); // bossName → step
  members.forEach(m => m.raids.forEach(r => {
    if (!bossMap.has(r.bossName)) bossMap.set(r.bossName, r.step);
  }));
  const bosses = [...bossMap.entries()].sort((a, b) => a[1] - b[1]);
  // bosses = [["스프레드 [H.S.T.A.]", 1], ["크리스탈 아머 [P.S.I.D.]", 2], ...]

  // ── 헤더 구성 ────────────────────────────────────────────────
  const headerRow = document.createElement("tr");
  const fixedCols = [
    { label: "#",         width: "40px"  },
    { label: "닉네임",    width: "160px" },
    { label: "싱크로레벨", width: "80px"  },
    { label: "총 대미지",  width: "150px" },
  ];
  fixedCols.forEach(({ label, width }) => {
    const th = document.createElement("th");
    th.textContent   = label;
    th.style.width    = width;
    th.style.minWidth = width;
    headerRow.appendChild(th);
  });
  bosses.forEach(([bossName]) => {
    const elem  = getBossElem(bossName);
    const short = shortBossName(bossName);
    const th    = document.createElement("th");
    th.className = "th-boss";
    th.title     = bossName;
    th.innerHTML = short +
      (elem ? '<br><span class="elem-' + elem + '">[' + elem + ']</span>' : "");
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);

  // ── 멤버 데이터 가공 (총대미지 합산 → 내림차순 정렬) ────────
  const rows = members.map(m => {
    const raidMap   = {}; // bossName → { dmg, count, finalHit }
    let total = 0;
    m.raids.forEach(r => {
      if (!raidMap[r.bossName]) raidMap[r.bossName] = { dmg: 0, count: 0, finalHit: false };
      raidMap[r.bossName].dmg      += r.totalDamage;
      raidMap[r.bossName].count    += 1;
      raidMap[r.bossName].finalHit  = raidMap[r.bossName].finalHit || r.isFinalHit;
      total += r.totalDamage;
    });
    return { ...m, total, raidMap };
  }).sort((a, b) => b.total - a.total);

  // ── 행 렌더 ──────────────────────────────────────────────────
  rows.forEach((member, idx) => {
    const syncroLevel = syncroMap[member.openId] || "—";

    const tr = document.createElement("tr");

    // 순위
    const tdRank = document.createElement("td");
    tdRank.textContent = idx + 1;
    tr.appendChild(tdRank);

    // 닉네임
    const tdName = document.createElement("td");
    tdName.className   = "td-name";
    tdName.textContent = member.name;
    tr.appendChild(tdName);

    // 싱크로레벨
    const tdSync = document.createElement("td");
    tdSync.textContent = syncroLevel;
    tr.appendChild(tdSync);

    // 총 대미지
    const tdTotal = document.createElement("td");
    tdTotal.className   = "td-total";
    tdTotal.textContent = fmt(member.total);
    tr.appendChild(tdTotal);

    // 보스별 대미지
    bosses.forEach(([bossName]) => {
      const td    = document.createElement("td");
      const entry = member.raidMap[bossName];
      const elem  = getBossElem(bossName);
      if (entry) {
        td.className = "td-damage " + (elem ? "td-boss-" + elem : "td-boss");
        const dmgStyle = entry.finalHit ? ' style="color:var(--red);font-weight:700;"' : "";
        td.innerHTML = '<span' + dmgStyle + '>' + fmt(entry.dmg) + '</span>' +
          (entry.count > 1
            ? ' <span style="font-size:10px;font-weight:700;color:var(--text-sub);margin-left:3px;">' + entry.count + '타</span>'
            : "");
      } else {
        td.className   = "td-empty td-boss-empty";
        td.textContent = "";
      }
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  // ── 푸터 렌더 ────────────────────────────────────────────────
  const tfoot = document.getElementById("raidTableFoot");
  tfoot.innerHTML = "";
  const tfr = document.createElement("tr");

  // # 셀 (빈칸)
  const tfEmpty = document.createElement("td");
  tfEmpty.textContent = "";
  tfr.appendChild(tfEmpty);

  // 닉네임 셀 (빈칸)
  const tfName = document.createElement("td");
  tfName.textContent = "";
  tfr.appendChild(tfName);

  // 싱크로레벨 → 평균
  const validLevels = rows.map(m => syncroMap[m.openId]).filter(v => v != null);
  const avgLevel = validLevels.length
    ? (validLevels.reduce((s, v) => s + v, 0) / validLevels.length).toFixed(1)
    : "—";
  const tfSync = document.createElement("td");
  tfSync.innerHTML = avgLevel + '<div class="td-foot-sub">평균</div>';
  tfr.appendChild(tfSync);

  // 총 대미지 → 합산
  const grandTotal = rows.reduce((s, m) => s + m.total, 0);
  const tfTotal = document.createElement("td");
  tfTotal.textContent = fmt(grandTotal);
  tfr.appendChild(tfTotal);

  // 보스별 합산 + 참여 인원수
  bosses.forEach(([bossName]) => {
    const elem  = getBossElem(bossName);
    let sumDmg  = 0;
    let cnt     = 0;
    rows.forEach(m => {
      const entry = m.raidMap[bossName];
      if (entry) { sumDmg += entry.dmg; cnt++; }
    });
    const td = document.createElement("td");
    td.className = elem ? "td-boss-" + elem : "";
    if (sumDmg) {
      td.innerHTML = fmt(sumDmg) + '<div class="td-foot-sub">' + cnt + '명 참여</div>';
    } else {
      td.textContent = "";
    }
    tfr.appendChild(td);
  });

  tfoot.appendChild(tfr);
}

// ─── 이벤트 ──────────────────────────────────────────────────────
seasonSelect.addEventListener("change", () => renderRaidTable(seasonSelect.value));
document.getElementById("compactToggle").addEventListener("change", () => renderRaidTable(seasonSelect.value));

renderRaidTable(seasonSelect.value);
</script>

<script>
(function() {
  const html  = document.documentElement;
  const btn   = document.getElementById("themeToggle");
  const saved = localStorage.getItem("theme");
  if (saved === "dark") { html.classList.add("dark"); btn.textContent = "☀️"; }
  btn.addEventListener("click", function() {
    const isDark = html.classList.toggle("dark");
    btn.textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
})();
</script>

</body>
</html>
