<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>시프티패드 | 승리의 여신: 니케</title>
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="여우별 시프티패드" />
  <meta property="og:description" content="여우별 유니온 시프티패드 현황" />
  <meta property="og:image"       content="https://foxstar.vercel.app/image/foxstar.png" />
  <meta property="og:url"         content="https://foxstar.vercel.app/shift.html" />
  <link rel="icon" type="image/png" href="image/foxstar.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark");</script>
  <style>html{background:#eef1f6}html.dark{background:#111827}</style>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .shift-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── 컨트롤 바 ─────────────────────────────────────────── */
    .shift-controls {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 18px;
    }
    .shift-controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .shift-controls select {
      height: 30px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      max-width: 160px;
    }
    .shift-controls select:focus { border-color: var(--blue); }

    /* ── 캐릭터 검색 콤보박스 ──────────────────────────────────── */
    .char-combo { position: relative; }
    .char-combo-input {
      height: 30px; padding: 0 8px;
      border: 1px solid var(--border); border-radius: 6px;
      background: var(--bg-card); color: var(--text);
      font-size: 13px; font-family: inherit;
      outline: none; box-sizing: border-box;
      width: 160px; cursor: text;
    }
    .char-combo-input:focus { border-color: var(--blue); }
    .char-dropdown {
      display: none;
      position: absolute; top: calc(100% + 3px); left: 0;
      min-width: 200px; max-height: 260px; overflow-y: auto;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      z-index: 500;
    }
    .char-dropdown.open { display: block; }
    .char-dropdown-item {
      padding: 7px 12px; font-size: 13px; color: var(--text);
      cursor: pointer; white-space: nowrap;
    }
    .char-dropdown-item:hover,
    .char-dropdown-item.active { background: var(--bg-muted); }
    .char-dropdown-item.selected { color: var(--blue); font-weight: 600; }
    .char-dropdown-sep {
      padding: 4px 12px; font-size: 10px; font-weight: 700;
      letter-spacing: .05em; color: var(--text-dim);
      background: var(--bg-muted); pointer-events: none;
      border-top: 1px solid var(--border);
    }
    .char-dropdown-empty {
      padding: 10px 12px; font-size: 12px; color: var(--text-dim);
      text-align: center;
    }

    @media (max-width: 600px) {
      .shift-controls {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .shift-controls label {
        display: grid;
        grid-template-columns: 60px 1fr;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      .shift-controls label span {
        text-align: right;
        white-space: nowrap;
      }
      .shift-controls select {
        width: 100%;
        max-width: none;
        height: 34px;
        font-size: 12px;
      }
      .char-combo { width: 100%; }
      .char-combo-input { width: 100%; font-size: 12px; height: 34px; }
    }

    /* ── 옵션 체크박스 필터 ─────────────────────────────────── */
    .shift-options {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 14px;
      margin-top: 10px;
      padding: 8px 12px;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
    }
    .shift-options-label {
      font-weight: 700;
      color: var(--text-sub);
      white-space: nowrap;
      margin-right: 2px;
    }
    .shift-options-checks {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 14px;
      align-items: center;
    }
    .opt-check {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      user-select: none;
      color: var(--text);
      white-space: nowrap;
    }
    .opt-check input[type="checkbox"] {
      width: 14px; height: 14px;
      accent-color: var(--blue);
      cursor: pointer;
      flex-shrink: 0;
    }
    @media (max-width: 600px) {
      .shift-options { gap: 6px 10px; padding: 8px 10px; }
      .shift-options-checks { gap: 6px 10px; }
    }

    /* ── 테이블 ────────────────────────────────────────────── */
    .shift-table-wrap { overflow-x: auto; }
    .shift-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      white-space: nowrap;
    }
    .shift-table th {
      padding: 9px 12px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: .06em;
      background: var(--bg-muted);
      text-align: center;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .shift-table th:first-child { border-radius: 8px 0 0 0; }
    .shift-table th:last-child  { border-radius: 0 8px 0 0; }
    .shift-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--bg-muted);
      color: var(--text);
      text-align: center;
      vertical-align: middle;
    }
    .shift-table tbody tr:last-child td { border-bottom: none; }
    .shift-table tbody tr:hover td      { background: var(--bg-muted); }

    /* ── 셀 스타일 ─────────────────────────────────────────── */
    .td-num      { color: var(--text-sub); font-size: 12px; }
    .td-name     { font-weight: 700; }
    .td-char     { font-weight: 600; }
    .btn-detail {
      margin-left: auto;
      flex-shrink: 0;
      padding: 2px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-muted);
      color: var(--text-sub);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      line-height: 1.4;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .btn-detail:hover {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }
    .td-uko      { font-weight: 700; color: var(--blue); }
    .td-atk      { font-weight: 600; }
    .td-skill    { font-weight: 600; }

    /* 스킬은 등급 구분 없이 모두 동일 */

    /* 돌파 뱃지 */
    .badge-fullco {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      vertical-align: middle;
      background: var(--amber-light);
      color: var(--amber);
      border: 1px solid #fde68a;
    }
    .badge-upgrade {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      vertical-align: middle;
      background: var(--bg-muted);
      color: var(--text-sub);
      border: 1px solid var(--border);
    }

    /* 소장품 등급 */
    .item-ssr { color: var(--amber);  font-weight: 700; }
    .item-sr  { color: #a855f7;       font-weight: 700; }
    .item-r   { color: var(--blue);   font-weight: 700; }

    .shift-table tbody tr { cursor: default; }

    /* ── 장비 상세 모달 ─────────────────────────────────────── */
    .equip-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 16px;
    }
    .equip-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%; max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .equip-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--border);
    }
    .equip-charname {
      display: flex; align-items: center;
      font-size: 16px; font-weight: 700; color: var(--text);
    }
    .equip-meta {
      font-size: 12px; color: var(--text-sub); margin-top: 3px;
    }
    .equip-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-sub); font-size: 18px; line-height: 1;
      padding: 2px 6px; border-radius: 6px;
    }
    .equip-close:hover { background: var(--bg-muted); color: var(--text); }
    .equip-totals {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-muted);
    }
    .equip-total-item {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
    }
    .equip-total-name { color: var(--text); }
    .equip-total-val  { font-weight: 700; color: var(--text); }
    .equip-total-item.total-max {
      background: #111827;
      border-color: #111827;
    }
    .equip-total-item.total-max .equip-total-name { color: #ffffff; }
    .equip-total-item.total-max .equip-total-val  { color: rgb(80,180,255); }
    .equip-total-item.total-blue .equip-total-val { color: rgb(80,180,255); }

    .equip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-radius: 0 0 14px 14px;
      overflow: hidden;
    }
    .equip-part {
      background: var(--bg-card);
      padding: 14px 16px;
    }
    .equip-part-title {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-sub);
      margin-bottom: 10px;
    }
    .equip-slot {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid var(--bg-muted);
      font-size: 12px;
    }
    .equip-slot:last-child { border-bottom: none; }
    .equip-slot-name {
      color: var(--text); flex: 1; min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .equip-slot-name.none { color: var(--text-sub); text-align: center; width: 100%; }
    .equip-slot-val {
      color: var(--text); font-weight: 700; white-space: nowrap; flex-shrink: 0;
    }
    .equip-slot-val.val-blue {
      color: rgb(80, 180, 255);
    }
    /* 최고 티어: 행 전체에 검정 배경 (텍스트 위치 유지) */
    .equip-slot.slot-max {
      background: #111827;
      border-radius: 5px;
      margin: 1px -12px;
      padding: 4px 12px;
      border-bottom: none;
    }
    .equip-slot.slot-max .equip-slot-name {
      color: #fff;
    }
    .equip-slot.slot-max .equip-slot-val {
      color: rgb(80, 180, 255);
    }

    @media (max-width: 500px) {
      .equip-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<!-- ═══════════ 인증 스크립트 ═══════════ -->
<script>
(function() {
  const overlay = document.getElementById("authOverlay");

  if (!window.__AUTH_REQUIRED) { overlay.style.display = "none"; return; }

  overlay.innerHTML =
    '<div style="' +
      'background:var(--bg-card);border:1px solid var(--border);border-radius:20px;' +
      'padding:40px 36px;width:100%;max-width:380px;' +
      'box-shadow:0 8px 40px rgba(0,0,0,0.18);text-align:center;' +
    '">' +
      '<div style="font-size:32px;margin-bottom:8px;">⬡</div>' +
      '<div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:4px;">' + CONFIG.unionName + '</div>' +
      '<div style="font-size:13px;color:var(--text-sub);margin-bottom:28px;">접근하려면 비밀번호를 입력하세요</div>' +
      '<input id="authInput" type="password" placeholder="비밀번호" autocomplete="current-password" style="' +
        'width:100%;box-sizing:border-box;height:42px;padding:0 14px;' +
        'border:1.5px solid var(--border);border-radius:10px;' +
        'background:var(--bg-muted);color:var(--text);' +
        'font-size:15px;font-family:inherit;outline:none;' +
        'transition:border-color 0.2s;margin-bottom:10px;' +
      '">' +
      '<div id="authError" style="font-size:12px;color:#ef4444;min-height:18px;margin-bottom:10px;"></div>' +
      '<button id="authBtn" style="' +
        'width:100%;height:42px;border:none;border-radius:10px;' +
        'background:var(--blue);color:#fff;' +
        'font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;' +
        'transition:opacity 0.15s;' +
      '">입장</button>' +
    '</div>';

  const input = document.getElementById("authInput");
  const btn   = document.getElementById("authBtn");
  const err   = document.getElementById("authError");

  input.addEventListener("focus",  function() { this.style.borderColor = "var(--blue)"; });
  input.addEventListener("blur",   function() { this.style.borderColor = "var(--border)"; });
  btn.addEventListener("mouseenter", function() { this.style.opacity = "0.85"; });
  btn.addEventListener("mouseleave", function() { this.style.opacity = "1"; });

  function attempt() {
    var entered = input.value.trim();
    if (!entered) return;
    btn.disabled = true;
    fetch("/api/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: entered })
    }).then(function(r) {
      if (r.ok) {
        location.reload();
      } else {
        err.textContent = "비밀번호가 올바르지 않습니다";
        input.value = "";
        input.style.borderColor = "#ef4444";
        btn.disabled = false;
        setTimeout(function() {
          err.textContent = "";
          input.style.borderColor = "var(--border)";
        }, 2000);
      }
    });
  }

  btn.addEventListener("click", attempt);
  input.addEventListener("keydown", function(e) { if (e.key === "Enter") attempt(); });
})();
</script>

// ─── 속성 색상 ───────────────────────────────────────────────────
const ELEMENT_COLOR = {
  "수냉": "#3b82f6",
  "작열": "#ef4444",
  "철갑": "#f59e0b",
  "전격": "#a855f7",
  "풍압": "#22c55e",
};
const ELEMENT_EMOJI = {
  "수냉": "🔵",
  "작열": "🔴",
  "철갑": "🟡",
  "전격": "🟣",
  "풍압": "🟢",
};
const ELEMENT_ORDER = ["수냉", "작열", "철갑", "전격", "풍압"];

function elementDot(element) {
  const color = ELEMENT_COLOR[element] || "#94a3b8";
  return '<span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:' + color + ';margin-right:5px;vertical-align:middle;flex-shrink:0"></span>';
}

// ─── 최신 시즌 고정 ──────────────────────────────────────────────
const seasonKeys   = Object.keys(UNION).map(Number).sort((a, b) => a - b);
const latestSeason = seasonKeys[seasonKeys.length - 1];

// ─── 캐릭터 / 멤버 셀렉터 ────────────────────────────────────────
const memberSelect = document.getElementById("memberSelect");

// S39 기준 우선순위 캐릭터 목록
const PRIORITY_CHARS = new Set([
  "나가", "나유타", "도로시 : 세렌디피티", "디젤 : 윈터 스위츠",
  "라피 : 레드 후드", "레드 후드", "레이븐", "루드밀라 : 윈터 오너",
  "루주", "리버렐리오", "리타", "리틀 머메이드",
  "마리", "마스트 : 로망틱 메이드", "메이든 : 아이스 로즈", "목단",
  "미란다", "미하라 : 본딩 체인", "벨벳", "브리드 : 사일런트 트랙",
  "스노우 화이트", "스노우 화이트 : 헤비암즈", "신데렐라", "아니스 : 스파클링 서머",
  "에이드 : 에이전트 바니", "이브", "일레그 : 붐 앤 쇼크", "크라운",
  "프리바티", "헬름", "헬름 : 아쿠아마린", "홍련 : 흑영",
]);

// ─── 캐릭터 검색 콤보박스 ────────────────────────────────────────
const charInput    = document.getElementById("charInput");
const charDropdown = document.getElementById("charDropdown");
let charAllOptions = []; // { value, label, group }
let charFilterValue = "";
let charActiveIdx   = -1;

function elemNameSort(a, b) {
  const ei = ELEMENT_ORDER.indexOf(a[1]);
  const ej = ELEMENT_ORDER.indexOf(b[1]);
  const diff = (ei === -1 ? 99 : ei) - (ej === -1 ? 99 : ej);
  return diff !== 0 ? diff : a[0].localeCompare(b[0], "ko");
}

function buildCharSelect() {
  const data = UNION[latestSeason];
  charAllOptions = [];

  if (data) {
    const seen = new Map();
    data.members.forEach(member => {
      (CHARACTERS[member.uid] || []).forEach(ch => {
        if (!seen.has(ch.name)) seen.set(ch.name, ch.element || "");
      });
    });

    const priority = [...seen.entries()].filter(([name]) =>  PRIORITY_CHARS.has(name)).sort(elemNameSort);
    const rest     = [...seen.entries()].filter(([name]) => !PRIORITY_CHARS.has(name)).sort(elemNameSort);

    if (priority.length > 0 && rest.length > 0) {
      priority.forEach(([name, element]) => {
        charAllOptions.push({ value: name, label: (ELEMENT_EMOJI[element] || "⚪") + " " + name, group: "주요" });
      });
      rest.forEach(([name, element]) => {
        charAllOptions.push({ value: name, label: (ELEMENT_EMOJI[element] || "⚪") + " " + name, group: "기타" });
      });
    } else {
      [...priority, ...rest].forEach(([name, element]) => {
        charAllOptions.push({ value: name, label: (ELEMENT_EMOJI[element] || "⚪") + " " + name, group: null });
      });
    }
  }

  // 선택 초기화
  charFilterValue = "";
  charInput.value = "";
  renderCharDropdown("");
}

function getDropdownItems() {
  return [...charDropdown.querySelectorAll(".char-dropdown-item")];
}

function setDropdownActive(idx) {
  const items = getDropdownItems();
  items.forEach(function(el, i) {
    el.classList.toggle("active", i === idx);
    if (i === idx) el.scrollIntoView({ block: "nearest" });
  });
  charActiveIdx = idx;
}

function renderCharDropdown(query) {
  const q = query.trim().toLowerCase();
  charDropdown.innerHTML = "";
  charActiveIdx = -1;

  // 전체 항목
  const allEl = document.createElement("div");
  allEl.className = "char-dropdown-item" + (charFilterValue === "" ? " selected" : "");
  allEl.textContent = "전체";
  allEl.dataset.value = "";
  charDropdown.appendChild(allEl);

  const filtered = q
    ? charAllOptions.filter(o => o.value.toLowerCase().includes(q))
    : charAllOptions;

  if (filtered.length === 0) {
    const empty = document.createElement("div");
    empty.className = "char-dropdown-empty";
    empty.textContent = "검색 결과 없음";
    charDropdown.appendChild(empty);
    return;
  }

  // 그룹 구분선 삽입 (검색 중엔 생략)
  let lastGroup = null;
  filtered.forEach(o => {
    if (!q && o.group && o.group !== lastGroup) {
      const sep = document.createElement("div");
      sep.className = "char-dropdown-sep";
      sep.textContent = o.group === "주요" ? "── 주요 캐릭터" : "── 기타 캐릭터";
      charDropdown.appendChild(sep);
      lastGroup = o.group;
    }
    const item = document.createElement("div");
    item.className = "char-dropdown-item" + (charFilterValue === o.value ? " selected" : "");
    item.textContent = o.label;
    item.dataset.value = o.value;
    charDropdown.appendChild(item);
  });
}

// 드롭다운 열기/닫기
charInput.addEventListener("focus", () => {
  renderCharDropdown(charInput.value);
  charDropdown.classList.add("open");
});
charInput.addEventListener("input", () => {
  renderCharDropdown(charInput.value);
  charDropdown.classList.add("open");
});
charDropdown.addEventListener("mousedown", e => {
  const item = e.target.closest(".char-dropdown-item");
  if (!item) return;
  e.preventDefault(); // blur 방지
  charFilterValue = item.dataset.value;
  charInput.value = charFilterValue === "" ? "" : charAllOptions.find(o => o.value === charFilterValue)?.label || charFilterValue;
  charDropdown.classList.remove("open");
  renderTable();
});
charInput.addEventListener("blur", () => {
  if (charFilterValue) {
    const opt = charAllOptions.find(o => o.value === charFilterValue);
    charInput.value = opt ? opt.label : charFilterValue;
  } else {
    charInput.value = "";
  }
  charDropdown.classList.remove("open");
  charActiveIdx = -1;
});

charInput.addEventListener("keydown", function(e) {
  const isOpen = charDropdown.classList.contains("open");

  if (e.key === "ArrowDown") {
    e.preventDefault();
    if (!isOpen) {
      renderCharDropdown(charInput.value);
      charDropdown.classList.add("open");
      setDropdownActive(0);
    } else {
      const items = getDropdownItems();
      setDropdownActive(Math.min(charActiveIdx + 1, items.length - 1));
    }
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    if (isOpen) {
      setDropdownActive(Math.max(charActiveIdx - 1, 0));
    }
  } else if (e.key === "Enter") {
    e.preventDefault();
    if (isOpen && charActiveIdx >= 0) {
      const items = getDropdownItems();
      const item  = items[charActiveIdx];
      if (item) {
        charFilterValue = item.dataset.value;
        charInput.value = charFilterValue === ""
          ? ""
          : (charAllOptions.find(o => o.value === charFilterValue)?.label || charFilterValue);
        charDropdown.classList.remove("open");
        charActiveIdx = -1;
        renderTable();
      }
    }
  }
});

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { charDropdown.classList.remove("open"); charActiveIdx = -1; }
});

function buildMemberSelect() {
  const data = UNION[latestSeason];
  memberSelect.innerHTML = "";

  const allOpt = document.createElement("option");
  allOpt.value       = "";
  allOpt.textContent = "전체";
  memberSelect.appendChild(allOpt);

  if (!data) return;

  // 싱크로레벨 내림차순 정렬
  const sorted = [...data.members].sort((a, b) => b.syncroLevel - a.syncroLevel);
  sorted.forEach(m => {
    const opt = document.createElement("option");
    opt.value       = m.name;
    opt.textContent = m.name + " (" + m.syncroLevel + ")";
    memberSelect.appendChild(opt);
  });
}

// ─── 장비 상세 모달 ──────────────────────────────────────────────
const EQUIP_PART_LABELS = [
  { new: "head",  old: ["head",  "body_head"], label: "헤드" },
  { new: "torso", old: ["body"],               label: "몸통" },
  { new: "arm",   old: ["hand"],               label: "팔"   },
  { new: "leg",   old: ["foot"],               label: "다리" }
];

// 구 포맷 파트키 (headOption1... bodyValue3... 등)
const OLD_PART_KEYS = {
  head:  { opts: ["headOption1","headOption2","headOption3"], vals: ["headValue1","headValue2","headValue3"] },
  body:  { opts: ["bodyOption1","bodyOption2","bodyOption3"], vals: ["bodyValue1","bodyValue2","bodyValue3"] },
  hand:  { opts: ["handOption1","handOption2","handOption3"], vals: ["handValue1","handValue2","handValue3"] },
  foot:  { opts: ["FootOption1","FootOption2","FootOption3"], vals: ["FootValue1","FootValue2","FootValue3"] }
};

// effect 값 → 티어 (blue: 1~3단계, max: 최고단계)
const VALUE_TIERS = {
  increaseElementDamage:         { blue: 24.96, max: 29.16 },
  increaseAtk:                   { blue: 12.52, max: 14.63 },
  increaseHitRate:               { blue: 12.52, max: 14.63 },
  increaseChargeDamage:          { blue: 12.52, max: 14.63 },
  increaseDef:                   { blue: 12.52, max: 14.63 },
  increaseMaxAmmunitionCapacity: { blue: 73.04, max: 85.37 },
  increaseChargeSpeed:           { blue: 5.21,  max: 6.09  },
  increaseCriticalDamage:        { blue: 17.42, max: 20.36 },
  increaseCriticalRate:          { blue: 6.05,  max: 7.07  }
};

function valueTier(effect, value) {
  const t = VALUE_TIERS[effect];
  if (!t || value == null) return "default";
  const v = parseFloat(value);
  if (Math.abs(v - t.max) < 0.005) return "max";
  if (v >= t.blue - 0.005)         return "blue";
  return "default";
}

// effect 키 → 한국어 라벨
const EFFECT_LABEL = {
  increaseAtk:                  "공격력 증가",
  increaseElementDamage:        "우월코드 대미지 증가",
  increaseCriticalDamage:       "크리티컬 대미지 증가",
  increaseCriticalRate:         "크리티컬 확률 증가",
  increaseMaxAmmunitionCapacity:"최대 탄약 수 증가",
  increaseDef:                  "방어력 증가",
  increaseHitRate:              "명중률 증가",
  increaseChargeSpeed:          "차지 스피드 증가",
  increaseChargeDamage:         "차지 대미지 증가"
};

function buildPartSlots(ch, partLabel) {
  const newKey = partLabel.new;
  const slots  = ch.equipSlots && ch.equipSlots[newKey];

  if (slots) {
    // 신 포맷: equipSlots.head/torso/arm/leg → [{effect, value}, ...]
    const result = [];
    for (let i = 0; i < 3; i++) {
      const s = slots[i];
      if (!s) { result.push({ text: null, val: null, effect: null }); continue; }
      result.push({ text: EFFECT_LABEL[s.effect] || s.effect, val: s.value, effect: s.effect });
    }
    return result;
  }

  // 구 포맷 폴백: headOption1/2/3 + headValue1/2/3 ...
  const oldKey = partLabel.old[0];
  const pk     = OLD_PART_KEYS[oldKey];
  if (!pk) return [{ text: null, val: null, effect: null }, { text: null, val: null, effect: null }, { text: null, val: null, effect: null }];
  return pk.opts.map((oKey, i) => {
    const raw  = ch[oKey];
    const val  = ch[pk.vals[i]];
    const text = raw ? raw.replace(/^\[|\]$/g, "").trim() : null;
    // 구 포맷은 effect 키가 없으므로 option 텍스트로 역매핑
    const effect = Object.keys(EFFECT_LABEL).find(k => EFFECT_LABEL[k] === text) || null;
    return { text: (text === "효과 없음" ? null : text), val, effect };
  });
}

function openEquipModal(member, ch) {
  const modal  = document.getElementById("equipModal");
  const grid   = document.getElementById("equipGrid");
  const charEl = document.getElementById("equipCharName");
  const metaEl = document.getElementById("equipMeta");

  charEl.innerHTML = elementDot(ch.element) + (ch.name + (ch.subName ? " · " + ch.subName : ""));
  metaEl.textContent = member.name + "  ·  " + (ch.upgrade || "—") + "  ·  " + (ch.element || "—");

  // ── 총합 옵션 수치 계산 ──────────────────────────────────────
  const EFFECT_ORDER = [
    "increaseElementDamage", "increaseAtk", "increaseMaxAmmunitionCapacity",
    "increaseCriticalDamage", "increaseCriticalRate",
    "increaseChargeSpeed", "increaseChargeDamage",
    "increaseDef", "increaseHitRate"
  ];
  const totalsMap = {};
  const tierMap   = {}; // effect → 최고 tier ("max" > "blue" > "default")
  EQUIP_PART_LABELS.forEach(p => {
    buildPartSlots(ch, p).forEach(function({ effect, val }) {
      if (!effect || val == null || val === 0) return;
      totalsMap[effect] = (totalsMap[effect] || 0) + parseFloat(val);
      const t = valueTier(effect, val);
      const cur = tierMap[effect] || "default";
      if (t === "max" || (t === "blue" && cur !== "max")) tierMap[effect] = t;
    });
  });

  const totalsEl = document.getElementById("equipTotals");
  totalsEl.innerHTML = "";
  Object.entries(totalsMap)
    .sort(function(a, b) {
      const ia = EFFECT_ORDER.indexOf(a[0]), ib = EFFECT_ORDER.indexOf(b[0]);
      return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
    })
    .forEach(function([effect, sum]) {
      const tier = tierMap[effect] || "default";
      const item = document.createElement("div");
      item.className = "equip-total-item" +
        (tier === "max" ? " total-max" : tier === "blue" ? " total-blue" : "");
      item.innerHTML =
        '<span class="equip-total-name">' + (EFFECT_LABEL[effect] || effect) + '</span>' +
        '<span class="equip-total-val">' + sum.toFixed(2) + '%</span>';
      totalsEl.appendChild(item);
    });

  grid.innerHTML = "";
  EQUIP_PART_LABELS.forEach(p => {
    const part = document.createElement("div");
    part.className = "equip-part";

    const title = document.createElement("div");
    title.className = "equip-part-title";
    title.textContent = p.label;
    part.appendChild(title);

    buildPartSlots(ch, p).forEach(({ text, val, effect }) => {
      const isNone = !text;
      const tier   = (!isNone && val != null && val !== 0) ? valueTier(effect, val) : "default";
      const row    = document.createElement("div");
      row.className = "equip-slot" + (tier === "max" ? " slot-max" : "");

      const nameEl = document.createElement("span");
      nameEl.className = "equip-slot-name" + (isNone ? " none" : "");
      nameEl.textContent = isNone ? "효과 없음" : text;
      row.appendChild(nameEl);

      if (!isNone && val != null && val !== 0) {
        const valEl = document.createElement("span");
        valEl.className = "equip-slot-val" + (tier === "blue" ? " val-blue" : "");
        valEl.textContent = val + "%";
        row.appendChild(valEl);
      }

      part.appendChild(row);
    });

    grid.appendChild(part);
  });

  modal.style.display = "flex";
}

function closeEquipModal() {
  document.getElementById("equipModal").style.display = "none";
}

document.getElementById("equipClose").addEventListener("click", closeEquipModal);
document.getElementById("equipModal").addEventListener("click", function(e) {
  if (e.target === this) closeEquipModal();
});
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeEquipModal();
});

// ─── 테이블 렌더링 ───────────────────────────────────────────────
function renderTable() {
  const filterChar   = charFilterValue;
  const filterMember = memberSelect.value;
  const data         = UNION[latestSeason];
  const tbody        = document.getElementById("shiftTableBody");
  tbody.innerHTML    = "";
  if (!data) return;

  // 모든 멤버의 캐릭터를 하나의 배열로 펼치기
  const rows = [];
  data.members.forEach(member => {
    if (filterMember && member.name !== filterMember) return;
    (CHARACTERS[member.uid] || []).forEach(ch => {
      if (!filterChar || ch.name === filterChar) {
        rows.push({ member, ch });
      }
    });
  });

  // 정렬 기준
  const sortKey = document.getElementById("sortSelect").value;
  function sortVal(ch) {
    const uko = ch.increaseElementDamage || 0;
    const atk = ch.increaseAtk || 0;
    if (sortKey === "atk") return atk;
    if (sortKey === "sum") return uko + atk;
    return uko; // default: uko
  }
  rows.sort((a, b) => {
    const diff = sortVal(b.ch) - sortVal(a.ch);
    if (diff !== 0) return diff;
    return a.ch.name.localeCompare(b.ch.name, "ko");
  });

  // ── 옵션 체크박스 상태 ──────────────────────────────────────────
  const showUko     = document.getElementById("optUko").checked;
  const showAtk     = document.getElementById("optAtk").checked;
  const showSum     = document.getElementById("optSum").checked;
  const showAmmo    = document.getElementById("optAmmo").checked;
  const showCharge  = document.getElementById("optCharge").checked;
  const showCritDmg = document.getElementById("optCritDmg").checked;

  // 컬럼 헤더 show/hide
  const colToggle = [
    { id: "thUko",     show: showUko     },
    { id: "thAtk",     show: showAtk     },
    { id: "thSum",     show: showSum     },
    { id: "thAmmo",    show: showAmmo    },
    { id: "thCharge",  show: showCharge  },
    { id: "thCritDmg", show: showCritDmg },
  ];
  colToggle.forEach(({ id, show }) => {
    const el = document.getElementById(id);
    if (el) el.style.display = show ? "" : "none";
  });

  // 헤더 정렬 화살표 표시
  ["thUko", "thAtk", "thSum"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = el.textContent.replace(" ▼", "");
  });
  const arrowMap = { uko: "thUko", atk: "thAtk", sum: "thSum" };
  const activeThId = arrowMap[sortKey];
  if (activeThId) {
    const th = document.getElementById(activeThId);
    if (th) th.textContent += " ▼";
  }

  const MAX_ROWS = 200;
  const totalRows = rows.length;
  const displayRows = rows.slice(0, MAX_ROWS);
  const infoEl = document.getElementById("shiftRowInfo");
  if (infoEl) {
    infoEl.textContent = totalRows > MAX_ROWS
      ? "총 " + totalRows + "개 중 " + MAX_ROWS + "개 표시"
      : "";
  }

  const dateEl = document.getElementById("shiftDateInfo");
  if (dateEl) {
    dateEl.textContent = CHARACTERS.actionDate ? "기준: " + CHARACTERS.actionDate : "";
  }

  displayRows.forEach(({ member, ch }, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML =
      '<td class="td-num">' + (i + 1) + '</td>' +
      '<td class="td-name">' + member.name + '</td>' +
      '<td>' + member.syncroLevel + '</td>' +
      '<td class="td-char" style="display:flex;align-items:center;justify-content:flex-start;gap:6px;">' +
        elementDot(ch.element) + ch.name +
        '<button class="btn-detail">자세히</button>' +
      '</td>' +
      '<td>' + upgradeBadge(ch.upgrade) + '</td>' +
      (showUko    ? '<td class="td-uko">'  + (ch.increaseElementDamage            != null ? ch.increaseElementDamage.toFixed(2)            + "%" : "—") + '</td>' : '') +
      (showAtk    ? '<td class="td-atk">'  + (ch.increaseAtk                      != null ? ch.increaseAtk.toFixed(2)                      + "%" : "—") + '</td>' : '') +
      (function() {
        if (!showSum) return '';
        const uko = ch.increaseElementDamage || 0;
        const atk = ch.increaseAtk || 0;
        const sum = uko + atk;
        return '<td class="td-uko">' + (uko || atk ? sum.toFixed(2) + "%" : "—") + '</td>';
      })() +
      (showAmmo   ? '<td class="td-atk">'  + (ch.increaseMaxAmmunitionCapacity    != null ? ch.increaseMaxAmmunitionCapacity.toFixed(2)    + "%" : "—") + '</td>' : '') +
      (showCharge  ? '<td class="td-atk">'  + (ch.increaseChargeSpeed              != null ? ch.increaseChargeSpeed.toFixed(2)              + "%" : "—") + '</td>' : '') +
      (showCritDmg ? '<td class="td-atk">'  + (ch.increaseCriticalDamage           != null ? ch.increaseCriticalDamage.toFixed(2)           + "%" : "—") + '</td>' : '') +
      '<td>' + itemHtml(ch.itemGrade, ch.itemLevel) + '</td>' +
      '<td class="td-skill">' + skillHtml(ch.skill1) + '</td>' +
      '<td class="td-skill">' + skillHtml(ch.skill2) + '</td>' +
      '<td class="td-skill">' + skillHtml(ch.skill3) + '</td>';
    tr.querySelector(".btn-detail").addEventListener("click", function(e) {
      e.stopPropagation();
      openEquipModal(member, ch);
    });
    tbody.appendChild(tr);
  });
}

// ─── 이벤트 ──────────────────────────────────────────────────────
memberSelect.addEventListener("change", renderTable);
document.getElementById("sortSelect").addEventListener("change", renderTable);
["optUko","optAtk","optSum","optAmmo","optCharge","optCritDmg"].forEach(id => {
  document.getElementById(id).addEventListener("change", renderTable);
});

buildCharSelect();
buildMemberSelect();
renderTable();
} // if (!window.__AUTH_REQUIRED)
</script>

<script>
(function() {
  const html  = document.documentElement;
  const btn   = document.getElementById("themeToggle");
  const saved = localStorage.getItem("theme");
  if (saved === "dark") { html.classList.add("dark"); btn.textContent = "☀️"; }
  btn.addEventListener("click", function() {
    const isDark = html.classList.toggle("dark");
    btn.textContent = isDark ? "☀️" : "🌙";
    localStorage.setItem("theme", isDark ? "dark" : "light");
  });
})();
</script>

<script>
(function(){
  document.addEventListener("contextmenu", function(e){ e.preventDefault(); });
  document.addEventListener("keydown", function(e){
    if (e.key === "F12") { e.preventDefault(); return; }
    if (e.ctrlKey && e.shiftKey && ["I","i","J","j","C","c"].includes(e.key)) { e.preventDefault(); return; }
    if (e.ctrlKey && ["u","U","s","S"].includes(e.key)) { e.preventDefault(); return; }
  });
  var devOpen = false;
  function checkDevTools(){
    var threshold = 160;
    var widthDiff  = window.outerWidth  - window.innerWidth  > threshold;
    var heightDiff = window.outerHeight - window.innerHeight > threshold;
    if (widthDiff || heightDiff) {
      if (!devOpen) {
        devOpen = true;
        document.body.innerHTML = "";
        document.title = "";
      }
    } else {
      devOpen = false;
    }
  }
  setInterval(checkDevTools, 1000);
})();
</script>
