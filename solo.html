<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>솔로레이드 | 승리의 여신: 니케</title>
  <link rel="icon" type="image/png" href="image/foxstar.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── 공통 ──────────────────────────────────────────────── */
    .raid-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }

    /* ── 컨트롤 바 ─────────────────────────────────────────── */
    .raid-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .raid-controls .season-group { margin-right: auto; }
    .raid-controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      user-select: none;
    }
    .raid-controls input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: var(--blue);
    }
    .raid-controls select {
      height: 30px;
      padding: 0 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }
    .raid-controls select:focus { border-color: var(--blue); }

    /* ── 섹션 구분 ─────────────────────────────────────────── */
    .raid-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }
    .raid-section + .raid-section { margin-top: 28px; }

    /* ── 공통 테이블 ───────────────────────────────────────── */
    .raid-table-wrap { overflow-x: auto; }
    .raid-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      white-space: nowrap;
    }
    .raid-table th {
      padding: 9px 14px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: .06em;
      background: var(--bg-muted);
      text-align: center;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .raid-table th:first-child { border-radius: 8px 0 0 0; }
    .raid-table th:last-child  { border-radius: 0 8px 0 0; }
    .raid-table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--bg-muted);
      color: var(--text);
      text-align: center;
      vertical-align: middle;
    }
    .raid-table tbody tr:last-child td { border-bottom: none; }
    .raid-table tbody tr:hover td      { background: var(--bg-muted); }

    /* ── 보스 테이블 ───────────────────────────────────────── */
    .boss-table td.td-name { font-weight: 700; }
    .boss-table td.td-weak { font-weight: 600; }
    .boss-table td.td-memo { text-align: left; color: var(--text-sub); font-size: 12px; }

    .core-o  { color: var(--green); font-weight: 700; font-size: 15px; }
    .core-x  { color: var(--red);   font-weight: 700; font-size: 15px; }
    .core-tri{ color: var(--amber); font-weight: 700; font-size: 15px; }

    /* ── 멤버 테이블 ───────────────────────────────────────── */
    .member-table th.th-deck {
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    .member-table td.td-deck {
      padding: 6px 4px;
      border-left: 1px solid var(--bg-muted);
      border-right: 1px solid var(--bg-muted);
    }
    .member-table td.td-name   { font-weight: 700; }
    .member-table td.td-damage { font-weight: 600; font-variant-numeric: tabular-nums; }

    .member-table tr.member-start td          { border-top: 2px solid var(--border); }
    .member-table tbody tr:first-child.member-start td { border-top: none; }

    /* ── 캐릭터 이미지 ─────────────────────────────────────── */
    .char-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .char-img {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: var(--bg-muted);
      display: block;
    }
    .char-name {
      font-size: 11px;
      color: var(--text);
      font-weight: 500;
    }

    /* ── 막타 체크박스 ─────────────────────────────────────── */
    .raid-table input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: default;
      accent-color: var(--blue);
      pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ═══════════ 헤더 ═══════════ -->
<header>
  <div class="container">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">승리의 여신: 니케 · UNION PORTAL</div>
        <div class="header-title" id="headerTitle">⬡ 발할라 유니온</div>
      </div>
      <a id="kakaoBtn" href="#" target="_blank" class="kakao-btn">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="#1a1200">
          <path d="M12 3C6.48 3 2 6.69 2 11.25c0 2.87 1.76 5.4 4.41 6.95L5.25 21 l3.86-2.06A11.3 11.3 0 0012 19.5c5.52 0 10-3.69 10-8.25S17.52 3 12 3z"/>
        </svg>
        가입 문의
      </a>
    </div>
    <nav>
      <a href="index.html">홈</a>
      <a href="raid.html">유니온레이드</a>
      <a href="solo.html" class="active">솔로레이드</a>
      <a href="shift.html">시프티패드</a>
    </nav>
  </div>
</header>

<!-- ═══════════ 메인 ═══════════ -->
<main>
  <div class="container page-content">
    <div class="raid-card">

      <!-- 컨트롤 바 -->
      <div class="raid-controls">
        <label class="season-group">
          시즌:
          <select id="seasonSelect"></select>
        </label>
        <label>
          <input type="checkbox" id="compactToggle" checked>
          간략히
        </label>
      </div>

      <!-- 보스 테이블 -->
      <div class="raid-section">
        <div class="raid-section-title">보스</div>
        <div class="raid-table-wrap">
          <table class="raid-table boss-table" style="width:auto; min-width:0;">
            <thead>
              <tr>
                <th>이름</th>
                <th>약점</th>
                <th>코어</th>
                <th style="text-align:left">메모</th>
              </tr>
            </thead>
            <tbody id="bossTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 기록 테이블 -->
      <div class="raid-section">
        <div class="raid-section-title">기록</div>
        <div class="raid-table-wrap">
          <table class="raid-table member-table">
            <thead>
              <tr>
                <th rowspan="2">#</th>
                <th rowspan="2">닉네임</th>
                <th rowspan="2">순위</th>
                <th rowspan="2">총 대미지</th>
                <th colspan="5" class="th-deck">덱</th>
                <th rowspan="2">대미지</th>
              </tr>
              <tr id="deckSubHeader"></tr>
            </thead>
            <tbody id="soloTableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- ═══════════ 데이터 로드 ═══════════ -->
<script src="data/config.js"></script>
<script src="data/solo.js"></script>

<!-- ═══════════ 솔로레이드 스크립트 ═══════════ -->
<script>
// ─── 기본 설정 ───────────────────────────────────────────────────
document.getElementById("headerTitle").textContent = "⬡ " + CONFIG.unionName;
document.getElementById("kakaoBtn").href = CONFIG.kakaoUrl;
document.title = "솔로레이드 | " + CONFIG.unionName;

// ─── 이미지 플레이스홀더 ─────────────────────────────────────────
const PLACEHOLDER = "data:image/svg+xml," + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 64 64">' +
  '<rect width="64" height="64" fill="#f1f5f9" rx="8"/>' +
  '<text x="32" y="40" text-anchor="middle" font-size="26" fill="#cbd5e1" font-family="sans-serif">?</text>' +
  '</svg>'
);

// ─── 대미지 포맷 ─────────────────────────────────────────────────
function fmtCompact(num) {
  if (num == null) return "—";
  const uk    = num / 100000000;
  const fixed = uk.toFixed(2);
  const parts = fixed.split(".");
  parts[0]    = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return parts.join(".") + "억";
}
function fmtFull(num) {
  if (num == null) return "—";
  return num.toLocaleString("ko-KR");
}

// ─── 코어 표시 ───────────────────────────────────────────────────
function coreHtml(val) {
  if (val === 1) return '<span class="core-o">O</span>';
  if (val === 0) return '<span class="core-x">X</span>';
  if (val === 2) return '<span class="core-tri">△</span>';
  return "—";
}

// ─── 시즌 셀렉터 초기화 ──────────────────────────────────────────
const seasonKeys   = Object.keys(SOLO_BOSS).map(Number).sort((a, b) => a - b);
const seasonSelect = document.getElementById("seasonSelect");
seasonKeys.forEach(k => {
  const opt = document.createElement("option");
  opt.value       = k;
  opt.textContent = "S" + k;
  seasonSelect.appendChild(opt);
});
seasonSelect.value = seasonKeys[seasonKeys.length - 1];

// ─── 덱 서브헤더 (슬롯 번호) ────────────────────────────────────
const subHeader = document.getElementById("deckSubHeader");
for (let i = 1; i <= 5; i++) {
  const th = document.createElement("th");
  th.textContent = i + "번";
  th.style.cssText = "font-size:10px; color:var(--text-dim); padding:4px 10px;";
  subHeader.appendChild(th);
}

// ─── 보스 테이블 렌더링 ──────────────────────────────────────────
function renderBossTable(season) {
  const boss  = SOLO_BOSS[season];
  const tbody = document.getElementById("bossTableBody");
  tbody.innerHTML = "";
  if (!boss) return;

  const tr = document.createElement("tr");
  tr.innerHTML =
    '<td class="td-name">' + boss.name + '</td>' +
    '<td class="td-weak">' + boss.weakness + '</td>' +
    '<td>' + coreHtml(boss.core) + '</td>' +
    '<td class="td-memo">' + (boss.memo || "") + '</td>';
  tbody.appendChild(tr);
}

// ─── 기록 테이블 렌더링 ──────────────────────────────────────────
function renderSoloTable(season) {
  const compact = document.getElementById("compactToggle").checked;
  const tbody   = document.getElementById("soloTableBody");
  tbody.innerHTML = "";

  const seasonData   = SOLO[season] || { totalPlayers: 0, members: [] };
  const totalPlayers = seasonData.totalPlayers || 0;

  // 총 대미지 합산 후 내림차순 정렬
  const members = [...seasonData.members]
    .map(m => ({ ...m, totalDamage: m.hit.reduce((s, h) => s + (h.damage || 0), 0) }))
    .sort((a, b) => b.totalDamage - a.totalDamage);

  // 서버 순위 표시 포맷
  function fmtServerRank(rank) {
    if (!rank) return "—";
    if (rank <= 200) return rank + "위";
    if (!totalPlayers) return rank + "위";
    const pct = (rank / totalPlayers * 100).toFixed(2);
    return pct + "%";
  }
  function serverRankClass(rank) {
    if (!rank) return "";
    if (rank === 1)   return "rank-1";
    if (rank <= 10)   return "rank-top";
    if (rank <= 200)  return "";
    return "dim";
  }

  members.forEach((member, mIdx) => {
    member.hit.forEach((h, hIdx) => {
      const tr = document.createElement("tr");

      if (hIdx === 0) {
        tr.classList.add("member-start");

        const tdRank = document.createElement("td");
        tdRank.rowSpan     = member.hit.length;
        tdRank.className   = mIdx === 0 ? "rank-1" : mIdx < 3 ? "rank-top" : "dim";
        tdRank.textContent = mIdx + 1;
        tr.appendChild(tdRank);

        const tdName = document.createElement("td");
        tdName.rowSpan     = member.hit.length;
        tdName.className   = "td-name";
        tdName.textContent = member.name;
        tr.appendChild(tdName);

        const tdServerRank = document.createElement("td");
        tdServerRank.rowSpan     = member.hit.length;
        tdServerRank.className   = serverRankClass(member.rank);
        tdServerRank.textContent = fmtServerRank(member.rank);
        tr.appendChild(tdServerRank);

        const tdTotal = document.createElement("td");
        tdTotal.rowSpan     = member.hit.length;
        tdTotal.className   = "td-damage";
        tdTotal.textContent = compact ? fmtCompact(member.totalDamage) : fmtFull(member.totalDamage);
        tr.appendChild(tdTotal);
      }

      // 덱 이미지 5칸
      h.deck.forEach(charName => {
        const tdDeck = document.createElement("td");
        tdDeck.className = "td-deck";
        tdDeck.innerHTML =
          '<div class="char-wrap">' +
            '<img class="char-img" src="image/' + charName + '.png" alt="' + charName + '" ' +
              'onerror="this.onerror=null;this.src=\'' + PLACEHOLDER + '\'">' +
            '<div class="char-name">' + charName + '</div>' +
          '</div>';
        tr.appendChild(tdDeck);
      });

      // 대미지
      const tdDmg = document.createElement("td");
      tdDmg.className   = "td-damage";
      tdDmg.textContent = compact ? fmtCompact(h.damage) : fmtFull(h.damage);
      tr.appendChild(tdDmg);

      tbody.appendChild(tr);
    });
  });
}

// ─── 전체 렌더 ───────────────────────────────────────────────────
function renderAll() {
  const season = Number(seasonSelect.value);
  renderBossTable(season);
  renderSoloTable(season);
}

seasonSelect.addEventListener("change", renderAll);
document.getElementById("compactToggle").addEventListener("change", renderAll);

renderAll();
</script>

</body>
</html>
